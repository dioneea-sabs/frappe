# Apache (public TLS edge) -> internal Traefik (127.0.0.1:8080) -> helpdesk bench.
# Same internal upstream as support.testable.org — Traefik + the bench resolve
# the correct SITE from the preserved Host header. This is the SECOND site on
# the SAME bench (its own database).
#
# Required once: a2enmod proxy proxy_http proxy_wstunnel ssl rewrite headers

<VirtualHost *:80>
    ServerName mindssupport.testable.org
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^/?(.*) https://%{SERVER_NAME}/$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName mindssupport.testable.org

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/mindssupport.testable.org/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/mindssupport.testable.org/privkey.pem

    ProxyRequests Off
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port  "443"

    # WebSocket (socket.io) upgrade
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) "ws://127.0.0.1:8080/$1" [P,L]

    # socket.io long-polling fallback
    ProxyPass        /socket.io/ http://127.0.0.1:8080/socket.io/
    ProxyPassReverse /socket.io/ http://127.0.0.1:8080/socket.io/

    ProxyPass        / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    ProxyTimeout 120
    LimitRequestBody 52428800
</VirtualHost>
