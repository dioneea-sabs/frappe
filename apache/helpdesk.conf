# Apache stays the public edge on :80/:443 and reverse-proxies the Helpdesk
# hostname to the internal Traefik router (127.0.0.1:8080), which routes by
# Host() to the helpdesk bench. TLS is terminated here by Apache.
#
# Required modules (enable once):
#   a2enmod proxy proxy_http proxy_wstunnel ssl rewrite headers   # Debian/Ubuntu
#   # RHEL/macOS httpd: load mod_proxy, mod_proxy_http, mod_proxy_wstunnel,
#   #                   mod_ssl, mod_rewrite, mod_headers in httpd.conf
#
# Frappe NEEDS websockets (socket.io) for realtime — mod_proxy_wstunnel below
# is not optional; without it notifications/live updates hang.

<VirtualHost *:80>
    ServerName helpdesk.example.com
    # Force HTTPS (and let certbot validate over :80 via .well-known).
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^/?(.*) https://%{SERVER_NAME}/$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName helpdesk.example.com

    SSLEngine on
    # Issue with: certbot certonly --webroot -w /var/www/html -d helpdesk.example.com
    SSLCertificateFile    /etc/letsencrypt/live/helpdesk.example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/helpdesk.example.com/privkey.pem

    ProxyRequests Off
    # Preserve Host so Traefik's Host(`helpdesk.example.com`) rule matches.
    ProxyPreserveHost On
    # Tell Frappe the original request was HTTPS (fixes redirects + cookies).
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port  "443"

    # --- WebSocket upgrade (socket.io) -> same internal endpoint -----------
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) "ws://127.0.0.1:8080/$1" [P,L]

    # socket.io long-polling fallback (non-upgrade requests)
    ProxyPass        /socket.io/ http://127.0.0.1:8080/socket.io/
    ProxyPassReverse /socket.io/ http://127.0.0.1:8080/socket.io/

    # --- Everything else ---------------------------------------------------
    ProxyPass        / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    # Match Frappe upload limits / slow reports if you raise them.
    ProxyTimeout 120
    LimitRequestBody 52428800
</VirtualHost>

# To add a SECOND Frappe instance: copy this file, change ServerName, the
# certbot domain, and the cert paths. The upstream stays 127.0.0.1:8080 — the
# internal Traefik routes to the right bench by the Host header you preserve.
